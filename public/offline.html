<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MERAM — Hors ligne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #F5EFE6;
      color: #1A0F06;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }
    .logo-mark {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(150deg, #6A3610 0%, #A0531A 65%, #C87B45 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(160,83,26,0.32);
      flex-shrink: 0;
    }
    .logo-text {
      display: flex;
      flex-direction: column;
    }
    .logo-name {
      font-size: 20px;
      font-weight: 800;
      color: #1A0F06;
      letter-spacing: -0.025em;
      line-height: 1;
    }
    .logo-tag {
      font-size: 9px;
      color: #7A6248;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 600;
      margin-top: 3px;
    }

    /* ── Card ── */
    .card {
      background: #FDFAF5;
      border-radius: 20px;
      border: 1px solid #DDD4C5;
      box-shadow: 0 4px 24px rgba(60,30,10,0.08), 0 1px 4px rgba(60,30,10,0.04);
      padding: 40px 36px 36px;
      width: 100%;
      text-align: center;
      overflow: hidden;
      position: relative;
      animation: fade-in-up 0.4s ease forwards;
    }

    /* Cognac accent stripe */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #6A3610 0%, #A0531A 60%, #C87B45 100%);
    }

    /* ── Icon ── */
    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #FEF2F2;
      border: 1.5px solid #FECACA;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: pulse-slow 3s ease-in-out infinite;
    }

    @keyframes pulse-slow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(153,27,27,0.08); }
      50%       { box-shadow: 0 0 0 10px rgba(153,27,27,0); }
    }

    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Typography ── */
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #1A0F06;
      margin-bottom: 10px;
      letter-spacing: -0.025em;
    }

    .subtitle {
      font-size: 14px;
      color: #7A6248;
      line-height: 1.65;
      margin-bottom: 28px;
    }

    /* ── Countdown ── */
    .retry-info {
      font-size: 12px;
      font-weight: 500;
      color: #A8906E;
      margin-bottom: 20px;
      min-height: 18px;
      letter-spacing: 0.01em;
    }

    /* ── Button ── */
    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6A3610 0%, #A0531A 60%, #C87B45 100%);
      color: #FAF5EE;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: -0.01em;
      transition: box-shadow 0.14s ease, transform 0.10s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary:hover {
      box-shadow: 0 6px 22px rgba(160,83,26,0.36);
      transform: translateY(-1px);
    }
    .btn-primary:active {
      transform: translateY(0);
      opacity: 0.9;
    }

    /* ── Status row ── */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #DDD4C5;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #991B1B;
      animation: blink 2s step-end infinite;
      flex-shrink: 0;
    }
    .status-text {
      font-size: 11.5px;
      color: #A8906E;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Logo -->
    <div class="logo">
      <div class="logo-mark">
        <svg width="22" height="18" viewBox="0 0 20 16" fill="none">
          <path d="M2.5 14V2.5L10 9L17.5 2.5V14" stroke="#FAF5EE" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2.5 14h15" stroke="#FAF5EE" stroke-width="2.3" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <div class="logo-name">MERAM</div>
        <div class="logo-tag">Manage · Sell · Optimize</div>
      </div>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="icon-wrap">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#991B1B" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <circle cx="12" cy="20" r="1" fill="#991B1B" stroke="none"/>
        </svg>
      </div>

      <h1>Connexion perdue</h1>
      <p class="subtitle">
        Vous êtes actuellement hors ligne.<br>
        Vérifiez votre connexion internet et réessayez.
      </p>

      <div class="retry-info" id="retry-info"></div>

      <div class="btn-row">
        <button class="btn-primary" onclick="manualRetry()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#FAF5EE" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2v6h-6"/>
            <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
            <path d="M3 22v-6h6"/>
            <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
          </svg>
          Réessayer
        </button>
      </div>

      <div class="status-row">
        <div class="status-dot" id="status-dot"></div>
        <span class="status-text" id="status-text">Hors ligne</span>
      </div>
    </div>
  </div>

  <script>
    var INTERVAL = 30
    var countdown = INTERVAL
    var timer = null
    var retrying = false

    function updateInfo() {
      var el = document.getElementById('retry-info')
      var dot = document.getElementById('status-dot')
      var txt = document.getElementById('status-text')

      if (retrying) {
        el.textContent = 'Vérification en cours…'
        dot.style.background = '#9A3412'
        txt.textContent = 'Vérification…'
      } else {
        el.textContent = countdown > 0
          ? 'Nouvelle tentative dans ' + countdown + ' s'
          : 'Reconnexion…'
        dot.style.background = '#991B1B'
        txt.textContent = 'Hors ligne'
      }
    }

    function tryReconnect() {
      retrying = true
      updateInfo()
      fetch(location.href, { method: 'HEAD', cache: 'no-store' })
        .then(function(r) {
          if (r.ok) { window.location.reload(); return }
          reset()
        })
        .catch(function() { reset() })
    }

    function reset() {
      retrying = false
      countdown = INTERVAL
      updateInfo()
    }

    function manualRetry() {
      clearInterval(timer)
      tryReconnect()
      timer = setInterval(tick, 1000)
    }

    function tick() {
      if (retrying) return
      countdown--
      if (countdown <= 0) {
        tryReconnect()
        countdown = INTERVAL
      }
      updateInfo()
    }

    updateInfo()
    timer = setInterval(tick, 1000)
  </script>
</body>
</html>
