<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UCA SGI — Hors ligne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #F8FAFC;
      color: #0F172A;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-family: Georgia, serif;
      font-size: 32px;
      font-weight: 700;
      color: #0C1A35;
      letter-spacing: 2px;
      margin-bottom: 32px;
    }
    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #FEF2F2;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon-wrap svg { width: 36px; height: 36px; }
    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #0F172A;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: #475569;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .retry-info {
      font-size: 12px;
      color: #94A3B8;
      margin-bottom: 20px;
      height: 18px;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    button {
      background: #1B3A6B;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    button:hover { background: #0C1A35; }
    button.secondary {
      background: transparent;
      color: #1B3A6B;
      border: 1.5px solid #CBD5E1;
    }
    button.secondary:hover { background: #F1F5F9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">UCA</div>

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="#DC2626" stroke="none"/>
      </svg>
    </div>

    <h1>Connexion perdue</h1>
    <p>
      Vous êtes actuellement hors ligne.<br>
      Vérifiez votre connexion internet et réessayez.
    </p>

    <div class="retry-info" id="retry-info"></div>

    <div class="btn-row">
      <button onclick="manualRetry()">Réessayer</button>
    </div>
  </div>

  <script>
    var INTERVAL = 30
    var countdown = INTERVAL
    var timer = null
    var retrying = false

    function updateInfo() {
      var el = document.getElementById('retry-info')
      if (retrying) {
        el.textContent = 'Vérification en cours…'
      } else {
        el.textContent = 'Nouvelle tentative dans ' + countdown + ' s'
      }
    }

    function tryReconnect() {
      retrying = true
      updateInfo()
      fetch(location.href, { method: 'HEAD', cache: 'no-store' })
        .then(function(r) {
          if (r.ok) { window.location.reload(); return }
          reset()
        })
        .catch(function() { reset() })
    }

    function reset() {
      retrying = false
      countdown = INTERVAL
      updateInfo()
    }

    function manualRetry() {
      clearInterval(timer)
      tryReconnect()
      timer = setInterval(tick, 1000)
    }

    function tick() {
      if (retrying) return
      countdown--
      if (countdown <= 0) {
        tryReconnect()
        countdown = INTERVAL
      }
      updateInfo()
    }

    // Start immediately
    updateInfo()
    timer = setInterval(tick, 1000)
  </script>
</body>
</html>
